<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>نظام مبيعات Uhtred Store</title>
    <link rel="stylesheet" href="/static/css/app.css?v=2">
</head>
<body>
    <div id="app">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="32" height="32" viewBox="0 0 108 108"><rect width="108" height="108" rx="12" fill="#0ea5e9"/><text x="54" y="72" font-size="48" fill="white" font-weight="bold" text-anchor="middle">U</text></svg>
                </div>
                <h2 class="sidebar-title">نظام مبيعات</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <div class="sidebar-menu">
                <a class="sidebar-item" data-page="dashboard" onclick="navigateTo('dashboard')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    الرئيسية
                </a>
                <a class="sidebar-item" data-page="pos" onclick="navigateTo('pos')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    نقطة البيع
                </a>
                <a class="sidebar-item" data-page="inventory" onclick="navigateTo('inventory')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
                    المخزون
                </a>
                <a class="sidebar-item" data-page="products" onclick="navigateTo('products')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    المنتجات
                </a>
                <a class="sidebar-item" data-page="customers" onclick="navigateTo('customers')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    الزبائن
                </a>
                <a class="sidebar-item" data-page="invoices" onclick="navigateTo('invoices')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    الفواتير
                </a>
                <a class="sidebar-item" data-page="reports" onclick="navigateTo('reports')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    التقارير
                </a>
                <a class="sidebar-item" data-page="stock" onclick="navigateTo('stock')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    الإضافات
                </a>
                <a class="sidebar-item" data-page="settings" onclick="navigateTo('settings')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    الإعدادات
                </a>
            </div>
            <div class="sidebar-footer">
                <a class="sidebar-item" onclick="logout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    تسجيل الخروج
                </a>
            </div>
        </nav>

        <main id="main-content">
            <header id="app-header">
                <button id="menu-btn" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 id="page-title">الرئيسية</h1>
                <span id="connection-status" title="حالة الاتصال">●</span>
            </header>
            <div id="page-content"></div>
        </main>
    </div>

    <div id="toast-container"></div>

    <div id="login-overlay">
      <div class="login-box">
        <div class="login-logo">Uhtred Store</div>
        <div class="login-subtitle">نظام إدارة المبيعات</div>
        <input type="text" id="login-username" class="login-input" placeholder="اسم المستخدم" autocomplete="username" onkeydown="if(event.key==='Enter') document.getElementById('login-password').focus()">
        <input type="password" id="login-password" class="login-input" placeholder="كلمة المرور" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
        <div id="login-error" class="login-error"></div>
        <button id="login-btn" class="login-btn" onclick="doLogin()">دخول</button>
      </div>
    </div>

    <script src="/static/js/app.js?v=3"></script>
</body>
</html>
