<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Uhtred Store - نظام نقاط البيع</title>
<link rel="stylesheet" href="/static/css/app.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
</head>
<body>

<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-store"></i></div>
    <h2>Uhtred Store</h2>
    <p class="login-subtitle">نظام إدارة المبيعات والمخزون</p>
    <div class="login-form">
      <div class="form-group">
        <label><i class="fas fa-user"></i> اسم المستخدم</label>
        <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم" autocomplete="username">
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" autocomplete="current-password">
      </div>
      <button onclick="handleLogin()" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> دخول</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>
</div>

<div id="app" class="app-container" style="display:none">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-store"></i>
      <span>Uhtred Store</span>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>
  <main class="content" id="content"></main>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button onclick="closeModal()" class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
